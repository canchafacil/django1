{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cancha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/estiloEstablecimiento.css' %}">
</head>

<body class="bg-dark text-white">

    <div class="container mt-5">

        <div class="card shadow-lg border-0">

            <div class="card-header text-center"
                 style="background-color:#62ff00; color:black;">
                <h3>Editar Cancha</h3>
            </div>

            <div class="card-body bg-dark text-white">

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Nombre
                        </label>

                        {{ form.nombre }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Tipo
                        </label>

                        {{ form.tipo }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Precio
                        </label>

                        {{ form.precio }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Imagen
                        </label>

                        {{ form.imagen }}
                    </div>

                    <div class="mb-3">
                        {{ form.disponible }}
                        <label class="form-label ms-2">
                            Disponible
                        </label>
                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{% url 'cancha_admin' %}"
                           class="btn btn-secondary">
                            Volver
                        </a>

                        <button type="submit"
                                class="btn"
                                style="background-color:#62ff00; color:black;">

                            Guardar Cambios

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
