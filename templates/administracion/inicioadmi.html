{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Administrador - CanchaFácil</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/inicioadmi.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="admin-card p-4 text-center shadow-lg bg-black">
        
        <img src="{% static 'img/logo-green.png' %}" alt="Logo de CanchaFácil" class="mb-3 img-fluid" width="90" height="90">
        
        <h1 class="h3 mb-4 fw-bold text-white">Inicio administrador</h1> 
        
        <div id="loginAlert" class="alert d-none mb-3 py-2 text-start" role="alert"></div>

        <form id="adminForm" novalidate>
            <div class="mb-3 text-start">
                <label for="adminName" class="form-label text-white fw-semibold">Usuario</label>
                <input 
                    type="text" 
                    id="adminName"
                    class="form-control custom-input bg-dark text-white" 
                    placeholder="Ingrese su usuario"
                    autocomplete="username"
                    required
                >
            </div>
            
            <div class="mb-4 text-start">
                <label for="adminPassword" class="form-label text-white fw-semibold">Contraseña</label>
                <input 
                    type="password" 
                    id="adminPassword"
                    class="form-control custom-input bg-dark text-white" 
                    placeholder="Ingrese su contraseña"
                    autocomplete="current-password"
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-custom w-100 rounded-pill fw-bold mb-3 py-2">
                Iniciar sesión
            </button>
        </form>
        
        <div class="mt-3">
            <a href="{% url 'login' %}" class="text-decoration-none back-link">Volver</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ── Credenciales válidas ──────────────────────────────────────────
        const ADMIN_CREDENTIALS = {
            username: "admin",
            password: "cancha2024"
        };

        // ── Referencias al DOM ────────────────────────────────────────────
        const form       = document.getElementById("adminForm");
        const nameInput  = document.getElementById("adminName");
        const passInput  = document.getElementById("adminPassword");
        const alertBox   = document.getElementById("loginAlert");

        // ── Función para mostrar alerta ───────────────────────────────────
        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} mb-3 py-2 text-start`;
        }

        // ── Limpiar alerta al escribir ────────────────────────────────────
        [nameInput, passInput].forEach(input => {
            input.addEventListener("input", () => {
                alertBox.className = "alert d-none mb-3 py-2 text-start";
            });
        });

        // ── Lógica del formulario ─────────────────────────────────────────
        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = nameInput.value.trim();
            const pass = passInput.value.trim();

            // Campos vacíos
            if (!name || !pass) {
                showAlert("⚠️ Por favor, completa todos los campos.", "warning");
                return;
            }

            // Credenciales correctas
            if (name === ADMIN_CREDENTIALS.username && pass === ADMIN_CREDENTIALS.password) {
                showAlert("✅ Acceso concedido. Redirigiendo...", "success");
                setTimeout(() => {
                    window.location.href = "{% url 'admin_panel' %}";
                }, 1500);
            } else {
                // Credenciales incorrectas
                showAlert("❌ Nombre de usuario o contraseña incorrectos. Intenta de nuevo.", "danger");
                passInput.value = "";
                passInput.focus();
            }
        });
    </script>
</body>
</html>
