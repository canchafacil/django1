{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - CanchaFácil</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/login.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="login-card p-4 text-center shadow-lg">
        
        <img src="{% static 'img/logo-green.png' %}" alt="Logo de CanchaFácil" class="mb-3 img-fluid" width="90" height="90">
        
        <h1 class="h3 mb-4 fw-bold text-white">Iniciar sesión</h1> 
        
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label for="username" class="form-label text-white fw-semibold">Nombre de usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    class="form-control custom-input" 
                    placeholder="Escribe tu usuario" 
                    autocomplete="username"
                    required
                >
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label text-white fw-semibold">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-control custom-input" 
                    placeholder="********" 
                    autocomplete="current-password"
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-custom w-100 rounded-pill fw-bold mb-3 py-2">
                Iniciar sesión
            </button>
        </form>
        
        <div class="login-links d-flex flex-column gap-2 mt-3">
            <a href="{% url 'registro' %}" class="text-decoration-none secondary-link">¿No tienes cuenta? Regístrate</a>
            <a href="{% url 'inicioadmi' %}" class="text-decoration-none secondary-link fw-semibold">Inicio administrador</a>
            <a href="{% url 'inicio' %}" class="text-decoration-none back-link mt-2">Volver</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            // Aquí puedes agregar la lógica de validación con tu base de datos o localStorage.
            // Por ahora, te redirige al inicio como lo tenías planeado:
            window.location.href = "{% url 'inicio' %}";
        });
    </script>
</body>
</html>
