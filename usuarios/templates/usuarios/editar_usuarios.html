{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Editar Usuario</title>
  <link rel="icon" href="{% static 'img/logo-green.png' %}" />
  <link rel="stylesheet" href="{% static 'css/editarusers.css' %}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

  <div class="admin-card p-4 text-center shadow-lg bg-black">
    <img src="{% static 'img/logo-green.png' %}" alt="Logo de CanchaFácil" class="mb-3 img-fluid" width="90"
      height="90" />

    <h1 class="h3 mb-4 fw-bold text-white">Editar Usuario</h1>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3 text-start">
        <label class="form-label text-white fw-semibold">Nombre</label>
        <input type="text" name="first_name" class="form-control custom-input bg-dark text-white"
          placeholder="Ingrese su Nombre" value="{{ usuario.first_name }}" required />
      </div>

      <div class="mb-3 text-start">
        <label class="form-label text-white fw-semibold">Correo</label>
        <input type="email" name="email" class="form-control custom-input bg-dark text-white"
          placeholder="Ingrese su correo" value="{{ usuario.email }}" required />
      </div>

      <div class="mb-3 text-start">
        <label class="form-label text-white fw-semibold">Número</label>
        <input type="text" name="phone" class="form-control custom-input bg-dark text-white"
          placeholder="Ingrese su Número" value="{{ usuario.phone }}" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Rol</label>

        <select name="rol" class="form-select">

          <option value="CLIENTE" {% if usuario.rol=='CLIENTE' %}selected{% endif %}>
            Cliente
          </option>
          <option value="ADMIN" {% if usuario.rol=='ADMIN' %}selected{% endif %}>
            Administrador
          </option>
          <option value="SUPERADMIN" {% if usuario.rol=='SUPERADMIN' %}selected{% endif %}>
            Superadministrador
          </option>
        </select>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label text-white fw-semibold">Contraseña</label>
        <input type="text" name="password" class="form-control custom-input bg-dark text-white"
          placeholder="Ingrese su Número" value="{{ usuario.password }}" required />
      </div>

      <button type="submit" class="btn btn-custom w-100 rounded-pill fw-bold mt-3 py-2">
        Guardar Cambios
      </button>

      <div class="login-links mt-3">
        <a href="{% url 'lista_usuarios' %}" class="secondary-link text-decoration-none fw-semibold">Volver</a>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
