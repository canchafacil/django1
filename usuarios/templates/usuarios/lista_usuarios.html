{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - CanchaFácil</title>
    <link rel="icon" href="{% static 'img/logo-green.png' %}">
    <link rel="stylesheet" href="{% static 'css/listausers.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">  
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="adm-body bg-dark text-white min-vh-100">

     <!-- Navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow cancha-nav">
        <div class="container">
            <div class="d-flex align-items-center">
                <img src="{% static 'img/logo-green.png' %}" style="height: 90px; object-fit: contain;"
                    alt="Logo CanchaFácil">
                <a class="navbar-brand fw-bold ms-2 m-0 logo-text" href="#" style="font-size: 2rem; color: white;">
                    Cancha<span style="color: #62ff00;">Fácil</span>
                </a>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav"
                aria-controls="menuNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="nav navbar-nav ms-auto mt-3 mt-lg-0 align-items-center gap-2" id="admTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="btn btn-custom rounded-pill active" id="mes-tab" data-bs-toggle="tab"
                            data-bs-target="#sec-ingreso-mes" type="button" role="tab" aria-controls="sec-ingreso-mes"
                            aria-selected="true">
                            Ingreso Mes
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="btn btn-custom rounded-pill" id="ingresos-tab" data-bs-toggle="tab"
                            data-bs-target="#sec-ingresos" type="button" role="tab" aria-controls="sec-ingresos"
                            aria-selected="false">
                            Ingresos
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="btn btn-custom rounded-pill" id="resenas-tab" data-bs-toggle="tab"
                            data-bs-target="#sec-resenas" type="button" role="tab" aria-controls="sec-resenas"
                            aria-selected="false">
                            Ver Reseñas
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="btn btn-custom rounded-pill" id="canchas-tab" data-bs-toggle="tab"
                            data-bs-target="#sec-canchas" type="button" role="tab" aria-controls="sec-canchas"
                            aria-selected="false">
                            Administrar Canchas
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="btn btn-custom rounded-pill" id="reservas-tab" data-bs-toggle="tab"
                            data-bs-target="#sec-reservas" type="button" role="tab" aria-controls="sec-reservas"
                            aria-selected="false">
                            Ver reservas
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a href="{% url 'lista_usuarios' %}" class="btn btn-custom rounded-pill">
                            Administrar usuarios
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="{% url 'login_admin' %}" class="btn btn-salir rounded-pill fw-bold py-2 px-4">Salir</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Lista de Usuarios</h1>

        <table class="table table-dark table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Eliminar</th>
                    <th>Editar</th>
                </tr>
            </thead>

            <tbody>

                {% for usuario in usuarios %}

                    <tr>
                        <td>{{ usuario.id }}</td>
                        <td>{{ usuario.first_name }}</td>
                        <td>{{ usuario.email }}</td>
                        <td>{{ usuario.rol }}</td>

                        <td>
                            <a href="{% url 'editar_usuario' usuario.id %}" class="btn btn-warning btn-sm">
                                Editar
                            </a>
                        </td>
                        <td>
                            <a href="{% url 'eliminar_usuario' usuario.id %}" class="btn btn-danger btn-sm"
                            onclick="return confirm('¿Estás seguro de eliminar este usuario?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>

                {% endfor %}

            </tbody>

        </table>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
