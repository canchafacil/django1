{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Administrador - CanchaFácil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/inicioadmi.css' %}">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="admin-card p-4 text-center shadow-lg bg-black">

        <img src="{% static 'img/logo-green.png' %}" alt="Logo de CanchaFácil" class="mb-3 img-fluid"
            width="90" height="90">

        <h1 class="h3 mb-4 fw-bold text-white">Inicio administrador</h1>

        <div id="loginAlert" class="alert d-none mb-3 py-2 text-start" role="alert"></div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Correo</label>
                <input type="email" name="email" class="form-control custom-input bg-dark text-white"
                    placeholder="Ingrese su correo" required>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label text-white fw-semibold">Contraseña</label>
                <input type="password" name="password" class="form-control custom-input bg-dark text-white"
                    placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" class="btn btn-custom w-100 rounded-pill fw-bold mb-3 py-2">
                Iniciar sesión
            </button>
        </form>

        <div class="login-links d-flex flex-column gap-2 mt-3">
            <a href="{% url 'registro_admin' %}" class="secondary-link text-decoration-none fw-semibold">¿No tienes cuenta? Regístrate</a>
            <a href="{% url 'inicio' %}" class="text-decoration-none back-link mt-2">Volver</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
